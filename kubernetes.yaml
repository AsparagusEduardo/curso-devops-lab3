apiVersion: v1
kind: Namespace
metadata:
  name: equezada
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: curso-devops-config
  namespace: equezada
data:
  USERNAME: "cmd"
---
apiVersion: v1
kind: Secret
metadata:
  name: curso-devops-secret
  namespace: equezada
type: Opaque
stringData:
  PASS_DB: "123456789abcde"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-devops-deployment
  namespace: equezada
  labels:
    app: curso-devops-stack
spec:
  replicas: 3
  selector:
    matchLabels:
      app: curso-devops-stack
  template:
    metadata:
      labels:
        app: curso-devops-stack
    spec:
      containers:
      - name: contenedor-curso-devops
        image: asparaguseduardo/curso-devops-lab3:latest
        imagePullPolicy: Always
        env:
        - name: USER_KEY
          valueFrom:
            configMapKeyRef:
              name: curso-devops-config
              key: USERNAME
              optional: true
        - name: BD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: curso-devops-secret
              key: PASS_DB
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: curso-devops-service
  namespace: equezada
  labels:
    app: curso-devops-stack
spec:
  selector:
     app: curso-devops-stack
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curso-devops-ingress
  namespace: equezada
spec:
  ingressClassName: nginx
  rules:
  - host: app.devops.cl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: curso-devops-service
            port:
              number: 80
